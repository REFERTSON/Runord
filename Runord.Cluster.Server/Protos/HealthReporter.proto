syntax = "proto3";

option csharp_namespace = "Runord.Cluster.Server.Grpc";

package runord.cluster;

service HealthReporter {
  rpc ReportHealth (HealthSnapshot) returns (ReportAck);
}

message HealthSnapshot {
  string worker_id = 1;
  double cpu_usage_percentage = 2;
  uint64 memory_used_bytes = 3;
  double memory_usage_percentage = 4;
}

message ReportAck {
  bool success = 1;
}